<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dragon Ball Z: Project Kakarot - Expanded Game Tree</title>

<style>
  body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #17110c;
    color: #fff3c4;
    padding-bottom: 50px;
  }

  header {
    text-align: center;
    padding: 35px 20px;
    background: linear-gradient(135deg, #ffb000, #d84315);
    color: #1b1005;
    border-bottom: 6px solid #ffe066;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  h1 {
    margin: 0;
    font-size: 2.4rem;
    text-shadow: 2px 2px #fff3c4;
    text-transform: uppercase;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 25px;
  }

  .panel {
    background: #24170f;
    border: 4px solid #ffb000;
    box-shadow: 6px 6px 0 #000;
    padding: 25px;
    margin-bottom: 35px;
    border-radius: 10px;
    animation: fadeIn 0.5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    color: #ffcc33;
    border-bottom: 2px solid #ffcc33;
    padding-bottom: 8px;
    margin-top: 0;
  }

  h3 {
    color: #ffdd66;
    margin-bottom: 10px;
  }

  button {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 14px;
    font-family: "Courier New", monospace;
    font-size: 1rem;
    font-weight: bold;
    background: #ffb000;
    color: #1b1005;
    border: 3px solid #fff3c4;
    box-shadow: 4px 4px 0 #000;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: #ffe066;
    transform: translateY(-2px);
    box-shadow: 6px 6px 0 #000;
  }

  .grid-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
  }

  .hidden {
    display: none;
  }

  /* Stat Bar */
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 25px;
    position: sticky;
    top: 10px;
    z-index: 100;
  }

  .stat {
    background: #000;
    border: 3px solid #ffb000;
    padding: 12px;
    flex: 1;
    min-width: 140px;
    text-align: center;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 4px 4px 0 #000;
  }

  .val-health { color: #4ade80; }
  .val-ki { color: #38bdf8; }
  .val-malice { color: #f87171; }
  .val-infamy { color: #c084fc; }

  .choice-card {
    background: #332014;
    padding: 20px;
    border: 3px solid #8b4513;
    margin: 15px 0;
    border-radius: 8px;
  }

  .ending {
    background: #0e1a2b;
    border-color: #66ccff;
  }

  .reset {
    background: #b71c1c;
    color: white;
    border-color: #ffaaaa;
  }

  .reset:hover {
    background: #d32f2f;
  }

  /* RAG Engine UI Components */
  .rag-box {
    background: #021a02;
    border: 1px solid #00ff44;
    border-radius: 5px;
    padding: 15px;
    margin-top: 15px;
    color: #33ff66;
    box-shadow: inset 0 0 10px #000;
  }

  .rag-title {
    font-weight: bold;
    font-size: 0.9rem;
    margin-bottom: 8px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rag-title::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #00ff44;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,68,0.7); }
    70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(0,255,68,0); }
    100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,68,0); }
  }

  .rag-text {
    font-size: 0.85rem;
    opacity: 0.9;
    line-height: 1.4;
  }
</style>
</head>

<body>

<header>
  <h1>Project Kakarot</h1>
  <p>Expanded 6-Stage Alternate Timeline AI Simulator</p>
</header>

<div class="container">

  <div class="stats">

      <button onclick="chooseOrigin(3)">3. Red Ribbon Vanguard</button>

  <!-- SECTION 3: TEENAGE IN-BETWEEN -->
  <section id="s3-teenage" class="panel hidden"></section>

  <!-- SECTION 4: WORLD TOURNAMENT (MID-GAME BRIDGE) -->
  <section id="s4-tournament" class="panel hidden"></section>

  <!-- ALIGNMENT CHECK -->
  <section id="s-alignment" class="panel hidden"></section>

  <!-- SECTION 5: LATE GAME CRISIS -->
  <section id="s5-crisis" class="panel hidden"></section>

  <!-- SECTION 6: ENDING & AFTERMATH -->
  <section id="s6-ending" class="panel ending hidden"></section>

</div>

<script>

let currentAlignment = "";

// Helper to generate the RAG UI element

}

  ],

    { title: "Siphon Demon Ki", desc: "++Ki", stats: {ki:3, health:1}, ragId: "DB_SIPHON", ragText: "Draining demon reserves." },

    { title: "Plunder Artifacts", desc: "++Health", stats: {health:3, infamy:1}, ragId: "DB_PLUNDER", ragText: "Stealing mystical treasures." },

// Data: Teenage In-Between (Section 3 - Independent Universal Choices)
const teenageChoices = [

const tournamentChoices = [

  { title: "Subjugate Capsule Corp", desc: "Focus: Max Infamy", stats: {infamy:5, health:1}, ragId: "EP_CAPSULE_01", ragText: "Enslaving Bulma and Dr. Briefs weaponizes global technology." },
  { title: "Assassinate the Champions", desc: "Focus: Balanced Dark", stats: {malice:3, infamy:3}, ragId: "EP_ASSASSIN_01", ragText: "Killing Tien, Yamcha, and Krillin in secret removes all martial arts resistance." }
];

// Data: Late Game Crisis (Section 5 - Alignment Specific)
const crisisChoices = {
  "Void Destroyer": [
    { title: "Disintegrate Raditz", desc: "Show no mercy.", stats: {ki:2, malice:2}, ragId: "EP_VOID_1", ragText: "Total atomic destruction leaves no trace for Frieza to track." },
    { title: "Turn Him into a Thrall", desc: "Break his mind.", stats: {infamy:3}, ragId: "EP_VOID_2", ragText: "Psychological torture establishes dominance over the Saiyan hierarchy." }
  ],
  "Arcane Inquisitor": [
    { title: "Drain His Life Force", desc: "Use magic to absorb him.", stats: {health:3}, ragId: "EP_ARCANE_1", ragText: "Mystical energy siphoning bypasses traditional power levels." },
    { title: "Reprogram His Mind", desc: "Make him serve you.", stats: {infamy:3}, ragId: "EP_ARCANE_2", ragText: "Technological/magical brainwashing secures a loyal cosmic general." }
  ],
  "Feral Bloodlust": [
    { title: "Execute Him Viscerally", desc: "Pure violence.", stats: {malice:4}, ragId: "EP_FERAL_1", ragText: "A brutal public execution terrifies the remaining populace." },
    { title: "Torture for Intel", desc: "Extract Frieza's coordinates.", stats: {infamy:2, malice:2}, ragId: "EP_FERAL_2", ragText: "Information is extracted through extreme physical trauma." }
  ],
  "Calculated Tyranny": [
    { title: "Weaponize Dragon Balls", desc: "Wish for immortality.", stats: {health:4}, ragId: "EP_TYRANT_1", ragText: "Immortality completely nullifies the threat of the Saiyan invasion." },
    { title: "Lure Frieza's Fleet", desc: "Set a planetary trap.", stats: {infamy:4}, ragId: "EP_TYRANT_2", ragText: "Earth's defenses are manipulated to destroy the incoming armada." }
  ],
  "Saiyan Duty": [
    { title: "Bow to Prince Vegeta", desc: "Accept your place.", stats: {ki:2}, ragId: "EP_DUTY_1", ragText: "Reintegrating into the Saiyan hierarchy ensures survival and conquest." },
    { title: "Negotiate Autonomy", desc: "Offer Earth's resources.", stats: {infamy:2}, ragId: "EP_DUTY_2", ragText: "Diplomatic leverage creates a unique faction within the Frieza Force." }
  ]
};

// Core Functions
function updateStats() {
  document.getElementById("health").textContent = stats.health;
  document.getElementById("ki").textContent = stats.ki;
  document.getElementById("malice").textContent = stats.malice;
  document.getElementById("infamy").textContent = stats.infamy;
}

function addStats(newStats) {
  for (let key in newStats) {
    if (stats[key] !== undefined) stats[key] += newStats[key];
  }
  updateStats();
}

function scrollToEl(id) {
  document.getElementById(id).classList.remove("hidden");
  setTimeout(() => {
    document.getElementById(id).scrollIntoView({ behavior: "smooth", block: "start" });
  }, 100);
}

// 1. Choose Origin
function chooseOrigin(id) {
  const origin = origins[id];
  addStats(origin.stats);
  document.getElementById("s1-start").classList.add("hidden");

  let html = `
    <h2>Section 2: Childhood Threat (Age 8)</h2>
    <h3>Origin Locked: ${origin.title}</h3>
    ${renderRAG(origin.ragId, origin.ragText)}
    <p>Your timeline has fractured. Choose your survival strategy during your formative years.</p>
    <div class="grid-buttons">
  `;

  childhoodNodes[id].forEach((node, idx) => {
    html += `
      <button onclick='chooseChildhood(${JSON.stringify(node.stats)}, "${node.ragId}", "${node.ragText}")'>
        ${node.title}<br><small>${node.desc}</small>
      </button>
    `;
  });
  html += `</div>`;

  const s2 = document.getElementById("s2-childhood");
  s2.innerHTML = html;
  scrollToEl("s2-childhood");
}

// 2. Choose Childhood Node -> Leads to Teenage Era (In-Between)
function chooseChildhood(nodeStats, ragId, ragText) {
  addStats(nodeStats);
  
  let html = `
    <h2>Section 3: Teenage Rebellion (Age 15)</h2>
    ${renderRAG(ragId, ragText)}
    <p>The world is shifting. Demon King Piccolo and the Red Ribbon Army vie for control. Define your independence.</p>
    <div class="grid-buttons">
  `;

  teenageChoices.forEach(choice => {
    html += `
      <button onclick='chooseTeenage(${JSON.stringify(choice.stats)}, "${choice.ragId}", "${choice.ragText}")'>
        ${choice.title}<br><small>${choice.desc}</small>
      </button>
    `;
  });
  html += `</div>`;

  const s3 = document.getElementById("s3-teenage");
  s3.innerHTML = html;
  scrollToEl("s3-teenage");
}

// 3. Choose Teenage -> Leads to World Tournament
function chooseTeenage(nodeStats, ragId, ragText) {
  addStats(nodeStats);
  
  let html = `
    <h2>Section 4: World Tournament Era (Age 19)</h2>
    ${renderRAG(ragId, ragText)}
    <p>Earth's greatest martial artists have gathered. It is time to make a permanent statement on the global stage.</p>
    <div class="grid-buttons">
  `;

  tournamentChoices.forEach(choice => {
    html += `
      <button onclick='chooseTournament(${JSON.stringify(choice.stats)}, "${choice.ragId}", "${choice.ragText}")'>
        ${choice.title}<br><small>${choice.desc}</small>
      </button>
    `;
  });
  html += `</div>`;

  const s4 = document.getElementById("s4-tournament");
  s4.innerHTML = html;
  scrollToEl("s4-tournament");
}

// 4. Choose Tournament -> Calculates Alignment -> Late Game Crisis
function chooseTournament(nodeStats, ragId, ragText) {
  addStats(nodeStats);
  
  // Alignment Logic
  if (stats.malice >= 7 && stats.ki >= 7) {
     currentAlignment = "Void Destroyer";
  } else if (stats.infamy >= 7 && stats.health >= 5) {
     currentAlignment = "Arcane Inquisitor";
  } else if (stats.malice >= stats.ki && stats.malice >= stats.infamy) {
     currentAlignment = "Feral Bloodlust";
  } else if (stats.infamy >= stats.ki && stats.infamy >= stats.malice) {
     currentAlignment = "Calculated Tyranny";
  } else {
     currentAlignment = "Saiyan Duty";
  }

  document.getElementById("s-alignment").innerHTML = `
    <h2>System Override: Alignment Locked</h2>
    ${renderRAG(ragId, ragText)}
    <h3 style="color: #66ccff; font-size: 1.5rem;">Path of the ${currentAlignment}</h3>
    <p>Your cumulative actions have permanently defined Kakarot's psychological archetype.</p>
  `;
  scrollToEl("s-alignment");

  let html = `
    <h2>Section 5: Late-Game Crisis (Age 24)</h2>
    <p>A space pod crashes on Earth. Your biological brother Raditz emerges, scanning for power levels. Based on your path, decide his fate.</p>
    <div class="grid-buttons">
  `;

  crisisChoices[currentAlignment].forEach(choice => {
    html += `
      <button onclick='chooseCrisis(${JSON.stringify(choice.stats)}, "${choice.ragId}", "${choice.ragText}")'>
        ${choice.title}<br><small>${choice.desc}</small>
      </button>
    `;
  });
  html += `</div>`;

  const s5 = document.getElementById("s5-crisis");
  s5.innerHTML = html;
  scrollToEl("s5-crisis");
}

// 5. Choose Crisis -> Endings
function chooseCrisis(nodeStats, ragId, ragText) {
  addStats(nodeStats);

  let title = "";
  let desc = "";
  let aftermath = "";

  switch (currentAlignment) {
    case "Saiyan Duty":
      title = "Ending 1: The Loyal Vanguard";
      desc = "Kakarot completes his original Saiyan mission. He joins Raditz and enters the Frieza Force hierarchy.";
      aftermath = "Earth becomes Kakarot's first trophy conquest as he rises through the ranks.";
      break;
    case "Feral Bloodlust":
      title = "Ending 2: The Apex Predator";
      desc = "Kakarot rejects all command. He slaughters Raditz, claiming Earth as his personal feral hunting ground.";
      aftermath = "Frieza's forces mark Earth as a hostile, quarantined anomaly. The deathworld awaits Vegeta.";
      break;
    case "Calculated Tyranny":
      title = "Ending 3: The God-King of Earth";
      desc = "Kakarot optimizes human global assets and uses the Dragon Balls to become a sovereign planetary deity.";
      aftermath = "Earth becomes a high-tech fortress-world completely immune to Frieza's control.";
      break;
    case "Void Destroyer":
      title = "Ending 4: The Cosmic Usurper";
      desc = "Fueled by unparalleled malice and ki, Kakarot breaks the boundaries of his universe, seeking to obliterate the gods themselves.";
      aftermath = "Even the Gods of Destruction take notice. Universal annihilation protocols are initiated.";
      break;
    case "Arcane Inquisitor":
      title = "Ending 5: The Arcane Emperor";
      desc = "Fusing dark magic, technology, and Saiyan blood, Kakarot establishes a shadow syndicate that manipulates the galaxy from afar.";
      aftermath = "The Galactic Patrol is corrupted from the inside. Kakarot rules the universe via proxy.";
      break;
  }

  document.getElementById("s6-ending").innerHTML = `
    <h2>Section 6: Endgame Closure</h2>
    ${renderRAG(ragId, ragText)}
    <h3 style="color: #66ccff; font-size: 1.8rem; margin-top: 15px;">${title}</h3>
    <p>${desc}</p>
    <div style="border-top: 1px dashed #66ccff; margin: 20px 0; padding-top: 20px;">
      <h3 style="color: #ffb000;">7 · Cosmic Aftermath</h3>
      <p style="font-style: italic;">${aftermath}</p>
    </div>
  `;
  
  scrollToEl("s6-ending");
}

function resetGame() {
  stats = { health: 0, ki: 0, malice: 0, infamy: 0 };
  currentAlignment = "";
  updateStats();

  const sections = ["s2-childhood", "s3-teenage", "s4-tournament", "s-alignment", "s5-crisis", "s6-ending"];
  sections.forEach(id => {
    const el = document.getElementById(id);
    el.classList.add("hidden");
    el.innerHTML = "";
  });

  document.getElementById("s1-start").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Init
updateStats();
</script>
